## SGA Petro — EMQX Configuration
## Config precedence: base.hocon < cluster.hocon < emqx.conf < env vars

node {
  name     = "emqx@127.0.0.1"
  cookie   = "emqxsecretcookie"
  data_dir = "data"
}

cluster {
  name               = emqxcl
  discovery_strategy = manual
}

dashboard {
  listeners {
    http.bind = 18083
  }
}

## ── Autenticação JWT RS256 ────────────────────────────────────────────────────
## Valida agentes (type=agent_token) E usuários PWA (type=user_token)
## Todos os tokens agora usam RS256 — chave pública embarcada aqui
## A chave privada fica SOMENTE no portal (JWT_PRIVATE_KEY)

authentication = [
  {
    mechanism  = jwt
    algorithm  = "public-key"
    use_jwks   = false
