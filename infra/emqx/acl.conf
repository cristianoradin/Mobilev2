%% SGA Petro — MQTT Authorization (ACL)
%% Regras avaliadas de cima para baixo; primeira correspondência vence.
%% ${username} é substituído pelo EMQX com o username do CONNECT packet.

%% 1. Portal service account: acesso irrestrito a todos os tópicos SGA
{allow, {username, "sga_portal"}, all, ["sga/#"]}.

%% 2. Dashboard EMQX: pode ler status do broker
{allow, {username, {re, "^dashboard$"}}, subscribe, ["$SYS/#"]}.

%% 3. Agentes e PWA: cada CNPJ só acessa seu próprio namespace
%%    username = CNPJ limpo (ex: 03851010000471); password = JWT
{allow, all, all, ["sga/${username}/#"]}.

%% 4. MIGRAÇÃO: permite tudo não coberto pelas regras anteriores
%%    Após PWA deployada com username=cnpj, mude para: {deny, all}.
{allow, all}.
