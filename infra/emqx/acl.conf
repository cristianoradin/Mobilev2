## EMQX ACL — SGA Petro
## Regras avaliadas em ordem; primeira que bater vence.
## Topics por CNPJ: sga/{cnpj_normalizado}/...
##   - cnpj_normalizado: apenas dígitos, sem pontos/traços/barra
##
## JWT claim 'cnpj' é injetado pelo portal ao gerar o token do agente.
## O agente só pode publicar/assinar em tópicos do seu próprio CNPJ.

## Permite que o agente publique resultados, alertas e heartbeat no seu próprio CNPJ
{allow, all, publish,   ["sga/${cnpj}/result", "sga/${cnpj}/status", "sga/${cnpj}/heartbeat", "sga/${cnpj}/alert"]}.

## Permite que o agente assine comandos e queries direcionadas a ele
{allow, all, subscribe, ["sga/${cnpj}/query", "sga/${cnpj}/command", "sga/${cnpj}/config"]}.

## Portal (usuários autenticados internamente) pode publicar queries e assinar resultados
## Configurado via EMQX API — não via ACL estático

## Bloqueia tudo o que não foi explicitamente permitido
{deny, all}.
